  - name: cs_churn_bq_slack
    description: "CS regression: BQ churn query + Slack alert — tests projectId format and credential types"
    department: cs
    prompt: >
      Create a daily workflow that queries BigQuery csm_churn_report for accounts
      with recent churn. Include the account owner from Salesforce. Post summary
      to #cs-churn-alerts in Slack. Run at 9am UTC daily.
    confirm_message: "Looks good, build it"
