  # ═══════════════════════════════════════════════════════════════════════════
  # Marketing Hackathon Test Cases (Tier 1.5 — Native Nodes, Complex Patterns)
  # ═══════════════════════════════════════════════════════════════════════════

  - name: hack_market_voice_sync
    description: "Hackathon T2-P1: RSS + Firecrawl scraping -> Gemini analysis -> Slack + Sheets (Amarelle Wenkert)"
    department: marketing
    prompt: >
      Create a weekly workflow that runs every Monday at 9am UTC.
      Step 1: Use the RSS Read node to fetch the latest 10 articles from
      https://example.com/industry-news/feed (placeholder RSS URL).
      Step 2: Use the Firecrawl node to scrape the homepage of a competitor
      website (use https://competitor.example.com as placeholder URL) and
      extract the main content text.
      Step 3: Use the Google Gemini node to analyze both the RSS headlines
      and the competitor page content. Generate a 5-bullet brief identifying
      market trends that overlap or diverge.
      Step 4: Post the AI brief to #marketing-intelligence in Slack.
      Step 5: Write the raw RSS headlines and competitor extract to a Google Sheet
      for historical tracking.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - slack
      - googleSheets
    expected_creds:
      googlePalmApi: LL8fLgZSrUn8oZtV
      slackOAuth2Api: MkMAiC1ecfpYtIz1
      googleSheetsOAuth2Api: LaWDjKMsqe74XASy
    checks:
      - encoding
      - uuids
      - credentials

  - name: hack_case_study_engine
    description: "Hackathon T2-P2: Webhook -> Gemini case study draft -> Google Docs -> Slack (Gal Givoli)"
    department: marketing
    prompt: >
      Build a webhook-triggered workflow for generating case study first drafts.
      Step 1: A webhook receives a JSON payload with fields: customerName,
      industry, challenge, solution, results, and quotation.
      Step 2: Use the Google Gemini node to generate a 500-word case study
      draft following this structure: Title, Challenge, Solution, Results,
      Customer Quote. Use a professional B2B SaaS tone.
      Step 3: Create a new Google Doc with the generated case study. Title
      the document "[Case Study] {customerName} - {industry}".
      Step 4: Post a notification to #marketing-content in Slack with the
      customer name and a link to the new Google Doc.
      Step 5: Return the Google Doc URL in the webhook response.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - slack
    expected_creds:
      googlePalmApi: LL8fLgZSrUn8oZtV
      googleDocsOAuth2Api: sgzXeonPZK1apIGE
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
      - encoding
      - uuids
      - credentials

  - name: hack_ai_marketing_brief
    description: "Hackathon T2-P3: Webhook -> Gemini validation -> Monday.com item -> Slack (Liat Shohet)"
    department: marketing
    prompt: >
      Build a webhook-triggered workflow that creates a Monday.com item from
      a marketing brief submission.
      Step 1: A webhook receives JSON with fields: projectName, assetType
      (one of: "email", "landing-page", "blog", "social"), targetAudience,
      keyMessage, deadline, and requesterEmail.
      Step 2: Use the Google Gemini node to validate the brief completeness.
      If any critical field is missing or too vague, generate a structured
      feedback message listing what's needed.
      Step 3: Create an item on a Monday.com board (use board ID 123456789
      as placeholder). Map projectName to Name column, assetType to Status
      column, deadline to Date column, and the full brief JSON to a Long Text
      column.
      Step 4: Post a confirmation to #marketing-briefs in Slack with the
      project name, asset type, and Monday.com item link.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - slack
    expected_creds:
      googlePalmApi: LL8fLgZSrUn8oZtV
      mondayComApi: XsKPBAGItELeiJ8S
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
      - encoding
      - uuids
      - credentials

  # ═══════════════════════════════════════════════════════════════════════════
  # Marketing Hackathon Test Cases (Tier 2 — HTTP Request Required)
  # ═══════════════════════════════════════════════════════════════════════════

  - name: hack_seo_reporting
    description: "Hackathon T2-P4: HTTP Request (Semrush API) -> Set parse -> Sheets + Slack (Estefania Jaramillo)"
    department: marketing
    prompt: >
      Create a weekly workflow that runs every Monday at 6am UTC.
      Step 1: Use an HTTP Request node to call the Semrush API domain
      analytics endpoint. Use GET method to
      https://api.semrush.com/?type=domain_ranks&key={{SEMRUSH_API_KEY}}&domain=guesty.com&database=us
      (use a placeholder API key). Parse the CSV response.
      Step 2: Use a second HTTP Request to get keyword rankings:
      https://api.semrush.com/?type=domain_organic&key={{SEMRUSH_API_KEY}}&domain=guesty.com&database=us&display_limit=20
      Step 3: Use a Set node to parse the CSV responses and extract: domain
      rank, organic traffic, organic keywords count, and top 20 keyword
      positions.
      Step 4: Write all metrics to a Google Sheet with columns: Date, Domain
      Rank, Organic Traffic, Organic Keywords, and a row per keyword with
      Position and Search Volume.
      Step 5: Post a summary to #marketing-seo in Slack with domain rank
      change and top 5 keywords by traffic.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - httpRequest
      - googleSheets
      - slack
    expected_creds:
      googleSheetsOAuth2Api: LaWDjKMsqe74XASy
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
      - encoding
      - uuids
      - credentials

  - name: hack_linkedin_content
    description: "Hackathon T2-P5: Google Docs -> Gemini 3 LinkedIn variations -> Sheets + Slack (Miguel Bordoy)"
    department: marketing
    prompt: >
      Build a manually triggered workflow for LinkedIn content repurposing.
      Step 1: Read a Google Doc by document ID containing a long-form blog
      post or article.
      Step 2: Use the Google Gemini node to generate 3 LinkedIn post
      variations from the content: (a) a thought-leadership hook post
      under 200 words, (b) a data-driven insight post with bullet points,
      (c) a storytelling post with a personal angle. Each should include
      3 relevant hashtags.
      Step 3: Write all 3 variations to a Google Sheet in separate rows with
      columns: Variation Type, Post Text, Hashtags, Character Count.
      Step 4: Post a notification to #marketing-content in Slack that 3
      LinkedIn drafts are ready for review, with a link to the Google Sheet.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - googleDocs
      - googleSheets
      - slack
    expected_creds:
      googleDocsOAuth2Api: sgzXeonPZK1apIGE
      googlePalmApi: LL8fLgZSrUn8oZtV
      googleSheetsOAuth2Api: LaWDjKMsqe74XASy
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
      - encoding
      - uuids
      - credentials

  - name: hack_webinar_creation
    description: "Hackathon T2-P6: Google Docs transcript -> Gemini extract + generate assets -> Sheets + Docs + Slack (Roberto + Nechama)"
    department: marketing
    prompt: >
      Build a manually triggered workflow for webinar asset creation.
      Step 1: Read a Google Doc by document ID containing a webinar
      transcript or planning document.
      Step 2: Use the Google Gemini node to extract from the transcript:
      webinar title, 3 key topics, target audience, and 5 bullet-point
      takeaways.
      Step 3: Use a second Google Gemini call to generate webinar
      marketing assets: (a) a 100-word landing page description,
      (b) a promotional email subject line and 150-word body,
      (c) 3 social media posts (Twitter-length, under 280 chars each).
      Step 4: Write all generated assets to a Google Sheet with columns:
      Asset Type, Content, Character Count.
      Step 5: Create a new Google Doc titled "[Webinar Assets] {webinar title}"
      containing all assets formatted with headers.
      Step 6: Post to #marketing-events in Slack with the webinar title and
      links to both the Google Sheet and the assets Google Doc.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - googleDocs
      - googleSheets
      - slack
    expected_creds:
      googleDocsOAuth2Api: sgzXeonPZK1apIGE
      googlePalmApi: LL8fLgZSrUn8oZtV
      googleSheetsOAuth2Api: LaWDjKMsqe74XASy
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
      - encoding
      - uuids
      - credentials
