      googleApi: VQ7CU7dKViVcv8Ah
      salesforceOAuth2Api: aBjJNGRAjYF66z5F  # sandbox (ENVIRONMENT PRIORITY)
      slackApi: 7H6auF31TpX7Wk7M
    checks:
      - encoding
      - uuids
      - credentials
      - bq_projectId

  - name: cs_renewal_declined_full
    description: "CS full scenario: SF Trigger + SF query + BQ + Filter + Slack — exact bad conversation pattern"
    department: cs
    prompt: >
      Create a production workflow that polls Salesforce every day at 6pm for updated opportunities.
      Use production credentials. When an opportunity is updated, query Salesforce for the
      opportunity details including Account.Name, Account.Account_Owner_F__c, Account.Average_MRR__c,
      and Account.Guesty_Admin_ID__c. Filter for renewal record type (RecordTypeId = "0125p000001101UAAQ")
      where Last_Stage__c contains "declined" and churn date is after 2024-01-01. Then query BigQuery
      csm_churn_report for max_paid_listings using the Guesty Admin ID. Format and post a churn alert
      to #cs-churn-notifications in Slack.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - salesforceTrigger
      - salesforce
      - filter
      - googleBigQuery
      - set
      - slack
    expected_creds:
      salesforceOAuth2Api: fCB6gfK7EaGpMnZy
      googleApi: VQ7CU7dKViVcv8Ah
      slackApi: 7H6auF31TpX7Wk7M
    checks:
      - encoding
      - uuids
      - credentials
      - bq_projectId
      - sf_config
      - slack_config

