    department: marketing
    prompt: >
      Create a weekly workflow that runs every Monday at 8am UTC. Query Salesforce
      for all Campaign records from the past 30 days where Type = 'Conference' or
      Type = 'Webinar'. Include Campaign Name, StartDate, NumberOfContacts, and
      Status. Write the results to a Google Sheet. Post a summary count to
      #marketing-events in Slack with total campaigns and contacts. Use the native
      Salesforce node, not BigQuery.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - salesforce
      - googleSheets
      - slack
    expected_creds:
      salesforceOAuth2Api: fCB6gfK7EaGpMnZy
      googleSheetsOAuth2Api: LaWDjKMsqe74XASy
      slackOAuth2Api: MkMAiC1ecfpYtIz1
    checks:
