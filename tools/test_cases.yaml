# Regression test cases for the n8n workflow builder.
# Each case defines a 2-turn conversation: prompt (Phase 1/2) → confirm → extract JSON → audit.
#
# Usage:
#   python tools/run_regression.py                         # runs all cases
#   python tools/run_regression.py --case uc1_finance      # runs one case

cases:
  - name: uc1_finance
    description: "UC1: Zuora configured vs invoiced payment gateway fee reconciliation (Finance dept)"
    department: finance
    prompt: >
      I need a daily workflow that reconciles payment gateway fees in Zuora. Compare the
      configured fees in product_catalog against the actually invoiced amounts in invoice_items.
      Flag any accounts where the configured fee doesn't match what was invoiced. Post a
      summary alert to Slack with the mismatched accounts. Run daily at 9am UTC.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - googleBigQuery
      - slack
    expected_creds:
      googleApi: h7fJ82YhtOnUL58u
      slackApi: g3NQlNzyjFofD87l
    checks:
      - encoding
      - uuids
      - credentials
      - bq_projectId

  - name: uc2_cx
    description: "UC2: Zendesk open tickets aging report by account (CX dept) — tests boolean IFNULL pattern, verified SQL example"
    department: cx
    prompt: >
      Build a daily workflow that queries BigQuery for Zendesk tickets that are open or
      pending and older than 7 days. Group them by account_name, show the count and oldest
      ticket per account. Post a summary to #cx-aging-tickets. Run daily at 9am UTC.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - googleBigQuery
      - slack
    expected_creds:
      googleApi: 2EJkTXIICSEva3cQ
      slackApi: RdxjTWVc6DaiNrIY
    checks:
      - encoding
      - uuids
      - credentials
      - bq_projectId

  - name: uc3_cs
    description: "UC3: Salesforce native node health score alert (CS dept)"
    department: cs
    prompt: >
      Create a daily workflow that queries Salesforce for accounts where
      Recent_Health_Score__c is below 50. Use the native Salesforce node, not BigQuery.
      Aggregate the results, format a Slack message with account name, score, MRR, and
      owner sentiment, then post to #cs-health-alerts. Run daily at 9am UTC.
    confirm_message: "Looks good, build it"
    expected_nodes:
      - salesforce
      - slack
    expected_creds:
      salesforceOAuth2Api: aBjJNGRAjYF66z5F
      slackApi: 7H6auF31TpX7Wk7M
    checks:
      - encoding
      - uuids
      - credentials
      - sf_config
      - slack_config

