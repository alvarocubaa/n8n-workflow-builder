    department: marketing
    prompt: >
      Create a workflow triggered when a new row is added to a Google Sheet (using
      Google Sheets Trigger). When triggered, read the value from column B (the
      content brief). Use the Google Gemini node to generate a 200-word
      compliance-focused draft based on that brief. Write the AI draft back to
      column C of the same row in the Google Sheet. Post a notification to
