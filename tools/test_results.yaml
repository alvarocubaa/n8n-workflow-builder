# Regression test results tracker.
# Updated by run_regression.py (--save-results flag) and manually after each run.
#
# Fields per result entry:
#   case:          test case name (matches test_cases.yaml)
#   version:       app version when tested (e.g. v0.18)
#   date:          test date (YYYY-MM-DD)
#   result:        PASS | FAIL | ERROR
#   audit_pass:    number of audit checks passed
#   audit_fail:    number of audit checks failed
#   elapsed_s:     seconds for the full 2-turn conversation
#   phase2_held:   true if Phase 2 gate was respected (separate turns)
#   nodes:         number of nodes in output workflow
#   code_node:     true if a Code node was used (violation of no_code_nodes rule)
#   tools_called:  number of MCP tool calls made
#   issues:        free-text notes on any problems observed
#   conversation:  Firestore conversation ID for reference
#
# History is append-only. Older entries are kept for trend analysis.
# To see latest result per case: filter by max(date) per case.

