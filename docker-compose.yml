version: '3.8'

services:
  n8n-mcp:
    build:
      context: ./n8n-mcp
      dockerfile: Dockerfile
    container_name: n8n-mcp
    restart: unless-stopped
    ports:
      - "3003:8080"
    env_file:
      - .env
    environment:
      - MCP_MODE=http
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
      - TRUST_PROXY=1
      # Higher rate limit for local dev testing (default is 20)
      - AUTH_RATE_LIMIT_MAX=200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chat-ui:
    build:
      context: .
      dockerfile: chat-ui/Dockerfile
    container_name: n8n-chat-ui
    restart: unless-stopped
    ports:
      - "3004:8080"
    env_file:
      - .env
    environment:
      # Claude AI (via Vertex AI — uses ADC, no API key needed)
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      # n8n-mcp backend (internal Docker network)
      - MCP_SERVICE_URL=http://n8n-mcp:8080
      - MCP_AUTH_TOKEN=${AUTH_TOKEN}
      # Local dev: bypass IAP with a mock user
      - MOCK_USER_EMAIL=${MOCK_USER_EMAIL:-dev@example.com}
      # Firestore — GCP project and service account credentials
      - GOOGLE_CLOUD_PROJECT=agentic-workflows-485210
      # ADC file for Vertex AI (personal account has aiplatform.user)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/adc_credentials.json
      - NODE_ENV=production
      # Knowledge file paths inside the container
      - SKILLS_DIR=/app/knowledge/skills
      - SPECS_DIR=/app/knowledge/specs
      # n8n Cloud instance (for direct workflow deployment)
      - N8N_API_URL=${N8N_API_URL}
      - N8N_API_KEY=${N8N_API_KEY}
    volumes:
      # Mount service account key for Firestore auth
      - ./chat-ui/credentials.json:/app/credentials.json:ro
      # Mount personal ADC credentials for Vertex AI access (local dev only)
      - ~/.config/gcloud/application_default_credentials.json:/app/adc_credentials.json:ro
      # Mount knowledge files (live reload without rebuild)
      - ./n8n-skills/skills:/app/knowledge/skills:ro
      - ./specs:/app/knowledge/specs:ro
    depends_on:
      n8n-mcp:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
