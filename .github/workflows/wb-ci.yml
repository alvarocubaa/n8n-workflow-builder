name: wb-ci

# Lint + typecheck gate for the chat-ui app. Secret-free (no next build, which can need runtime env).
# Runs on every PR so the required check is present for branch protection (incl. docs-only PRs).
on:
  pull_request:

permissions:
  contents: read

jobs:
  wb-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
