name: wb-ci

# Typecheck gate for chat-ui. Secret-free (no next build / no next lint — the repo's next-lint is
# misconfigured; tsc --noEmit is the reliable signal). Runs on every PR so the required check is
# present for branch protection (incl. docs-only PRs).
on:
  pull_request:

permissions:
  contents: read

jobs:
  wb-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
